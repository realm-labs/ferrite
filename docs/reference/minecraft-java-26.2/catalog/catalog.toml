# Exact ID counts and hashes make broad fallback families safe: a changed registry
# fails coverage before any new ID can silently inherit `remaining = true`.

[[category]]
kind = "block"
source = "reports/blocks.json"
expected_count = 1196
ids_sha1 = "8b11cf08c57a1d88e979fe0c695b23a9a29a5579"

[[category.family]]
name = "fluid-block"
classification = "Special"
rules = ["ENV-001", "ENV-FLUID-001"]
exact = ["water", "lava"]

[[category.family]]
name = "falling-block"
classification = "BehaviorFamily"
rules = ["BLK-006", "BLK-FALL-001"]
exact = ["sand", "red_sand", "gravel", "anvil", "chipped_anvil", "damaged_anvil", "dragon_egg", "scaffolding", "concrete_powder", "suspicious_sand", "suspicious_gravel"]
patterns = ["*_concrete_powder"]

[[category.family]]
