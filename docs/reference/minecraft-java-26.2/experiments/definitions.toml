# All procedures are original behavioral probes. `planned` is intentionally not
# evidence: rules cite these as the owner of unresolved details.

[[experiment]]
id = "EXP-SIM-001"
rules = ["SIM-PIPELINE-001"]
mode = "gametest"
status = "planned"
repeats = 3
initial_state = ["Overworld and one custom dimension with shared trace storage", "Each level has a due scheduled block callback that queues a block event, one ordinary marker entity, one player-ridden vehicle, and one ticking block entity"]
action = [{ tick = 0, value = "Arm phase observers, freeze, and request three steps" }, { tick = 4, value = "Remain frozen for one admitted tick, then unfreeze and stall the loop beyond the overload threshold" }]
observation = [{ tick = 1, value = "Record runGameElements, server tick count, dimension ID, and scheduled/block-event/entity/block-entity callback order" }, { tick = 4, value = "Record functions, sleep/sky, ordinary entity, player-ridden vehicle, block entity, connection, and autosave-countdown activity during freeze" }, { tick = 7, value = "Record deadline before/after overload and number of gameplay transitions" }]
expected = ["Each of the three steps runs normal phases; the fourth admitted tick is frozen", "Within each level scheduled block precedes block event, eligible entity roots/passengers, then block entity; overworld precedes the custom level", "During freeze functions, player-ridden entities, connections, and bookkeeping continue while ordinary entities and block-entity callbacks stop", "Overload skips missed deadlines and executes one whole transition"]

