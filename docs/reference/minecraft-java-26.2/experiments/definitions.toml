# All procedures are original behavioral probes. `planned` is intentionally not
# evidence: rules cite these as the owner of unresolved details.

[[experiment]]
id = "EXP-SIM-001"
rules = ["SIM-PIPELINE-001"]
mode = "gametest"
status = "planned"
repeats = 3
initial_state = ["One level with a scheduled block, block event, marker entity, and ticking block entity"]
action = [{ tick = 0, value = "Arm every observer for tick 1" }]
observation = [{ tick = 1, value = "Append each callback kind to one scoreboard trace" }]
expected = ["scheduled block precedes block event, entity, then block entity"]

[[experiment]]
id = "EXP-SIM-002"
rules = ["SIM-SCHEDULE-001"]
mode = "gametest"
status = "planned"
repeats = 3
initial_state = ["Empty block tick queue with callbacks for all priorities"]
action = [{ tick = 0, value = "Schedule same-position duplicates, zero-delay nested work, and 65,537 due entries" }]
observation = [{ tick = 1, value = "Record callback order and remaining queue count" }]
expected = ["deduplication, comparator order, bounded drain, and no recursive unbounded callback"]

