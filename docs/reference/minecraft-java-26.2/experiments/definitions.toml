mode = "gametest"
status = "planned"
repeats = 8
initial_state = ["Two separately saved chunks whose restored head ticks have equal trigger, priority, and reconstructed sub-order", "Instrumented callbacks append chunk ID and server tick to persistent storage"]
action = [{ tick = 0, value = "Load chunk A then B, admit one scheduled-tick drain, and record order" }, { tick = 2, value = "Reset the same saved inputs, load chunk B then A, admit one drain, and record order" }]
observation = [{ tick = 1, value = "Record callback order, restored priority/sub-order, and chunk container admission order for A-then-B" }, { tick = 3, value = "Record the same fields for B-then-A" }]
expected = ["The source-specified comparator ties; observations determine whether load/container history creates a stable vanilla order or the behavior must remain explicitly unstable"]

[[experiment]]
id = "EXP-SIM-003"
rules = ["SIM-RANDOM-001"]
mode = "gametest"
status = "planned"
repeats = 64
initial_state = ["Bottom and top sections containing instrumented eligible block states with captured eligible fluid states", "Chunks at propagated levels 31 and 32 plus one chunk for each of the nine ticket types", "Observers for gameplay-RNG draws, position-stream values, state replacement, and callback sequence"]
action = [{ tick = 0, value = "Tick at speeds 0, 1, and 3; force precipitation outcomes miss/hit/miss" }, { tick = 2, value = "Move the level-32 chunk to 31 after 1,000 inactive ticks and exercise every ticket type" }, { tick = 3, value = "In the first block callback replace the sampled state, consume RNG, remove current-section eligibility, and add eligibility to a later section" }]
observation = [{ tick = 1, value = "Record precipitation draws, position-stream advances, section index, sampled positions, and block/fluid callback sequence" }, { tick = 2, value = "Record admission at levels 31/32 and for each ticket simulation flag, including any catch-up" }, { tick = 3, value = "Record remaining current-section attempts, later-section admission, captured fluid identity, and later RNG values" }]
expected = ["Precipitation consumes one gameplay-RNG draw per speed attempt but advances the position stream only on a hit", "Sections traverse bottom-to-top with exactly speed samples after one section eligibility check", "Only level 31 and the five simulation ticket types admit random work; inactive time causes no catch-up", "The captured block callback precedes fluid derived from the old state, and callback RNG shifts later consumers"]

[[experiment]]
id = "EXP-SIM-004"
rules = ["SIM-PIPELINE-001"]
mode = "dedicated"
status = "planned"
repeats = 3
initial_state = ["A dedicated server with pause-when-empty-seconds=1 and one connected observer", "Counters for base tick admission, autosave, connection maintenance, and emptyTicks"]
action = [{ tick = 0, value = "Disconnect the observer immediately after a completed base tick" }, { tick = 1, value = "Keep the server empty through the fixed 20-loop threshold" }, { tick = 21, value = "Reconnect through the maintained connection path" }]
observation = [{ tick = 19, value = "Record 19 completed empty base ticks and emptyTicks=19" }, { tick = 20, value = "Record equality-transition autosave/connection work and unchanged admitted tick count" }, { tick = 21, value = "Record later connection-only maintenance, then the first admitted tick after reconnect" }]
expected = ["Exactly 19 empty base ticks complete before the threshold invocation", "The threshold invocation autosaves once and maintains connections without admitting a base tick", "Later paused loops do not autosave again; a connected player resets emptyTicks and restores admission"]

