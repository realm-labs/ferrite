fields = ["ID 0; protocol version signed VarInt, host UTF(255), unsigned big-endian port, intent VarInt 1=status/2=login/3=transfer."]
mappings = ["Status selects a connection-local discovery session; host/port remain untrusted routing context and no C0 field enters simulation or persistence.", "No registry, entity-metadata, data-component, or acknowledgement mapping occurs in handshake."]
