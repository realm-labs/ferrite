version = "26.2"

# This is the recoverable root-command inventory for SURFACE-COMMAND-ADMINISTRATION-001.
# Families establish broad state-domain ownership only. Their remaining_work entries deliberately
# prevent root coverage from being mistaken for leaf, permission, result, or ordering completion.

[inventory]
expected_count = 92
roots_sha1 = "14bbe081980917f9ce81f5a6dc877823963f0e59"

